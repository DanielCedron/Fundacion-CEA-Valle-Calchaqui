<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - QuixLauncher</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        
        .container {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            text-align: center;
            border-bottom: 2px solid #444;
            padding-bottom: 15px;
            margin-top: 0;
            color: #f1f1f1;
        }

        .section {
            background-color: #333;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
        }

        .section h3 {
            margin-top: 0;
            color: #4CAF50;
            font-size: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #bbb;
            font-size: 14px;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #1f1f1f;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        input[type="file"] {
            padding: 8px;
            cursor: pointer;
        }
        
        input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>

    <div class="container">
        <h1>QuixLauncher Admin</h1>

        <!-- SECCIÓN: Novedad 1 -->
        <div class="section">
            <h3>Cartel: Novedad 1</h3>
            <label>Seleccionar Imagen desde la PC (Nov 1):</label>
            <input type="file" id="fileNov1" accept="image/*">
            
            <label>Link de Destino (Al hacer clic):</label>
            <input type="text" id="urlNov1" placeholder="Ej: https://store.steampowered.com/app/123">
            
            <button onclick="actualizarDatos('nov1', 'fileNov1', 'urlNov1', 'statusNov1')">Subir y Actualizar Novedad 1</button>
            <div id="statusNov1" class="status"></div>
        </div>

        <!-- SECCIÓN: Novedad 2 -->
        <div class="section">
            <h3>Cartel: Novedad 2</h3>
            <label>Seleccionar Imagen desde la PC (Nov 2):</label>
            <input type="file" id="fileNov2" accept="image/*">
            
            <label>Link de Destino (Al hacer clic):</label>
            <input type="text" id="urlNov2" placeholder="Ej: https://youtube.com/video">
            
            <button onclick="actualizarDatos('nov2', 'fileNov2', 'urlNov2', 'statusNov2')">Subir y Actualizar Novedad 2</button>
            <div id="statusNov2" class="status"></div>
        </div>

        <!-- SECCIÓN: Botón Juegos -->
        <div class="section">
            <h3>Sección: Juegos</h3>
            <label>Seleccionar Imagen (Fondo Juegos):</label>
            <input type="file" id="fileJuegos" accept="image/*">
            
            <label>Link de Destino (Web de Juegos):</label>
            <input type="text" id="urlJuegos" placeholder="Ej: https://tusitio.com/juegos">
            
            <button onclick="actualizarDatos('juegos', 'fileJuegos', 'urlJuegos', 'statusJuegos')">Subir y Actualizar Juegos</button>
            <div id="statusJuegos" class="status"></div>
        </div>

        <!-- SECCIÓN: Botón Tienda -->
        <div class="section">
            <h3>Sección: Tienda</h3>
            <label>Seleccionar Imagen (Fondo Tienda):</label>
            <input type="file" id="fileTienda" accept="image/*">
            
            <label>Link de Destino (Web de la Tienda):</label>
            <input type="text" id="urlTienda" placeholder="Ej: https://tusitio.com/tienda">
            
            <button onclick="actualizarDatos('tienda', 'fileTienda', 'urlTienda', 'statusTienda')">Subir y Actualizar Tienda</button>
            <div id="statusTienda" class="status"></div>
        </div>

    </div>

    <!-- SDK de Firebase (Solo Database) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref as dbRef, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ==========================================
        // 1. PON TU CLAVE DE IMGBB AQUÍ
        // ==========================================
        const IMGBB_API_KEY = "PEGA_AQUI_TU_CLAVE_DE_IMGBB";

        // ==========================================
        // 2. CONEXIÓN A TU FIREBASE (Igual que antes)
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://quix-ce6d9-default-rtdb.firebaseio.com/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Función de subida
        window.actualizarDatos = async function(rutaDB, idInputFile, idInputUrl, idStatus) {
            const fileInput = document.getElementById(idInputFile);
            const linkDestino = document.getElementById(idInputUrl).value.trim();
            const statusElement = document.getElementById(idStatus);

            if (fileInput.files.length === 0 || linkDestino === "") {
                statusElement.textContent = "Error: Debes seleccionar una imagen y poner un link de destino.";
                statusElement.className = "status error";
                return;
            }

            if (IMGBB_API_KEY === "68faba876c6a75e2a3569b6467f976d1") {
                statusElement.textContent = "Error: No has puesto tu clave de ImgBB en el código HTML.";
                statusElement.className = "status error";
                return;
            }

            const archivoFisico = fileInput.files[0];
            statusElement.textContent = "Subiendo imagen a ImgBB... (espera unos segundos)";
            statusElement.className = "status";

            try {
                // 1. Preparamos la imagen para enviarla a ImgBB
                const formData = new FormData();
                formData.append("image", archivoFisico);

                // 2. Subimos la imagen usando la API de ImgBB
                const respuestaImgbb = await fetch("https://api.imgbb.com/1/upload" + IMGBB_API_KEY, {
                    method: "POST",
                    body: formData
                });
                
                const datosImgbb = await respuestaImgbb.json();

                if (!datosImgbb.success) {
                    throw new Error("ImgBB rechazó la imagen. Comprueba tu API Key.");
                }

                // 3. Obtenemos el link público directo de la imagen subida
                const linkImagenDescarga = datosImgbb.data.url;

                statusElement.textContent = "¡Imagen subida! Guardando en Firebase...";

                // 4. Guardamos todo en tu Realtime Database
                await set(dbRef(db, 'novedades/' + rutaDB), {
                    imagen: linkImagenDescarga,
                    url: linkDestino
                });

                statusElement.textContent = "¡Actualizado con éxito en el Launcher!";
                statusElement.className = "status success";
                
                fileInput.value = "";
                
                setTimeout(() => {
                    statusElement.textContent = "";
                }, 4000);

            } catch (error) {
                statusElement.textContent = "Error: " + error.message;
                statusElement.className = "status error";
            }
        };
    </script>

</body>
</html>
