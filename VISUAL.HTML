<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor Textil Pro - Versión Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; color: white; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; width: 260px; border: 1px solid #333; }
        .btn { display: block; width: 100%; margin: 8px 0; padding: 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        #status { font-size: 11px; color: #ffc107; margin-top: 10px; line-height: 1.4; }
        input[type="file"] { background: #333; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <h3 style="margin-top:0">🎨 Diseñador Textil</h3>
        <label style="font-size: 12px;">1. Cargar modelo .GLB:</label>
        <input type="file" id="model-input" accept=".glb" class="btn">
        
        <label style="font-size: 12px;">2. Interacción:</label>
        <button id="mode-toggle" class="btn" style="background: #28a745; color: white;">Modo: Rotar Cámara</button>
        
        <div id="status">Carga un modelo para comenzar.</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer, controls, raycaster, mouse;
        let mainModel, paintCanvas, paintCtx, paintTexture;
        let isMouseDown = false;
        let mode = 'ROTATE'; 

        const TX_RES = 1024; // Resolución de la textura de pintado

        function init() {
            // Escena y Cámara
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // Iluminación
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(1, 1, 2);
            scene.add(light);

            // Controles y Raycaster
            controls = new OrbitControls(camera, renderer.domElement);
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Setup del Canvas para pintar
            paintCanvas = document.createElement('canvas');
            paintCanvas.width = paintCanvas.height = TX_RES;
            paintCtx = paintCanvas.getContext('2d');
            paintCtx.fillStyle = 'white'; // Color base de la tela
            paintCtx.fillRect(0, 0, TX_RES, TX_RES);

            paintTexture = new THREE.CanvasTexture(paintCanvas);
            paintTexture.flipY = false; // Necesario para que coincida con el estándar GLTF

            // Eventos de Mouse
            renderer.domElement.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                if (mode === 'PAINT') paintAtMouse();
            });
            window.addEventListener('mouseup', () => isMouseDown = false);
            renderer.domElement.addEventListener('mousemove', onMouseMove);

            // Lógica del Botón de Modo
            document.getElementById('mode-toggle').onclick = (e) => {
                mode = mode === 'ROTATE' ? 'PAINT' : 'ROTATE';
                const btn = e.target;
                btn.innerText = mode === 'ROTATE' ? 'Modo: Rotar Cámara' : 'Modo: Pintar Tela';
                btn.style.background = mode === 'ROTATE' ? '#28a745' : '#dc3545';
                controls.enabled = (mode === 'ROTATE');
            };

            // Cargador de Modelos
            document.getElementById('model-input').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                
                new GLTFLoader().load(url, (gltf) => {
                    if (mainModel) scene.remove(mainModel);
                    mainModel = gltf.scene;
                    
                    mainModel.traverse(node => {
                        if (node.isMesh) {
                            // Aplicamos nuestra textura dinámica al modelo
                            node.material.map = paintTexture;
                            node.material.needsUpdate = true;
                        }
                    });
                    
                    scene.add(mainModel);
                    document.getElementById('status').innerText = "Modelo cargado. Activa el modo pintar para dibujar.";
                });
            };
        }

        function onMouseMove(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            if (isMouseDown && mode === 'PAINT') {
                paintAtMouse();
            }
        }

        function paintAtMouse() {
            if (!mainModel) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(mainModel, true);

            if (intersects.length > 0) {
                const hit = intersects[0];
                if (hit.uv) {
                    const x = hit.uv.x * TX_RES;
                    const y = (1 - hit.uv.y) * TX_RES; // Invertimos Y para el canvas

                    // Dibujar círculo rojo
                    paintCtx.fillStyle = '#ef4444';
                    paintCtx.beginPath();
                    paintCtx.arc(x, y, 10, 0, Math.PI * 2);
                    paintCtx.fill();

                    // Avisar a Three.js que la textura cambió
                    paintTexture.needsUpdate = true;
                } else {
                    console.warn("El modelo no tiene coordenadas UV.");
                    document.getElementById('status').innerText = "Error: El modelo no tiene mapa UV para pintar.";
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.enabled) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
